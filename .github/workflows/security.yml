name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          ignore_paths: scripts

  shellharden:
    name: Shellharden
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellharden
        run: cargo install shellharden
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      - name: Check quoting hygiene
        run: shellharden --check statusline-command.sh

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Scan
        run: semgrep scan --config p/trailofbits --error statusline-command.sh
