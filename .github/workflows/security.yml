name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@224daa3e2e254302fca0c5ef3a5700df5668b1f5 # v2.0.0
        with:
          severity: warning
          ignore_paths: scripts

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Syntax check
        run: bash -n statusline-command.sh
      - name: Smoke — empty input
        run: output=$(echo '{}' | bash statusline-command.sh); [ -n "$output" ]
      - name: Smoke — full input
        run: |
          output=$(echo '{"cwd":"/tmp","context_window":{"total_input_tokens":35000,"total_output_tokens":7300,"used_percentage":67.0},"model":{"display_name":"Claude Sonnet 4.6"}}' | bash statusline-command.sh)
          [ -n "$output" ]

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.75.0
    steps:
      - uses: actions/checkout@v4
      - name: Scan
        run: semgrep scan --config p/trailofbits --error statusline-command.sh
