<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
      text { font-family: "SF Mono", "Fira Code", "Courier New", monospace; }
    </style>
  </defs>

  <!-- Dark background (Tokyo Night) -->
  <rect width="100%" height="100%" fill="#16161e"/>

  <!-- ═════════════════════════════════════════════════════════════════ -->
  <!-- STATE 1: Normal Usage (65% context, 45% rate limit) -->
  <!-- ═════════════════════════════════════════════════════════════════ -->
  <g id="state1">
    <text x="20" y="35" font-size="13" font-weight="bold" fill="#a9b1d6">Normal Usage</text>
    <text x="20" y="53" font-size="10" fill="#565f89">(65% context, 45% rate limit)</text>

    <!-- Terminal box -->
    <rect x="20" y="65" width="1160" height="60" fill="#1a1b26" stroke="#3b4261" stroke-width="1" rx="4"/>

    <!-- Statusline -->
    <text x="30" y="90" font-size="11" font-family="SF Mono, Fira Code, monospace" fill="#7ba3ff">~/p/claude-code-statusline</text>

    <!-- Context bar (65% = WARN) -->
    <text x="280" y="90" font-size="11" fill="#565f89">󰍛</text>
    <text x="298" y="90" font-size="11" fill="#ffcc88">━━━╌╌╌ 65%</text>

    <!-- Token count -->
    <text x="395" y="90" font-size="11" fill="#7aa2f7">⬡ 165.0k</text>

    <!-- Rate limit (45% = OK) -->
    <text x="502" y="90" font-size="11" fill="#565f89">󰔟</text>
    <text x="520" y="90" font-size="11" fill="#89dd94">━━╌╌╌╌ 45%</text>

    <!-- Model -->
    <text x="636" y="90" font-size="11" fill="#ff9e64">◈ Claude Sonnet 4.6</text>
  </g>

  <!-- ═════════════════════════════════════════════════════════════════ -->
  <!-- STATE 2: High Usage (80% context, 60% rate limit) -->
  <!-- ═════════════════════════════════════════════════════════════════ -->
  <g id="state2" transform="translate(0, 140)">
    <text x="20" y="35" font-size="13" font-weight="bold" fill="#a9b1d6">High Usage (Warning)</text>
    <text x="20" y="53" font-size="10" fill="#565f89">(80% context, 60% rate limit)</text>

    <!-- Terminal box -->
    <rect x="20" y="65" width="1160" height="60" fill="#1a1b26" stroke="#3b4261" stroke-width="1" rx="4"/>

    <!-- Statusline -->
    <text x="30" y="90" font-size="11" fill="#7ba3ff">~/p/claude-code-statusline</text>

    <!-- Context bar (80% = WARN) -->
    <text x="280" y="90" font-size="11" fill="#565f89">󰍛</text>
    <text x="298" y="90" font-size="11" fill="#ffaa44">━━━━╌╌ 80%</text>

    <!-- Token count -->
    <text x="395" y="90" font-size="11" fill="#7aa2f7">⬡ 180.0k</text>

    <!-- Rate limit (60% = WARN) -->
    <text x="502" y="90" font-size="11" fill="#565f89">󰔟</text>
    <text x="520" y="90" font-size="11" fill="#ffcc88">━━━━╌╌ 60%</text>

    <!-- Model -->
    <text x="636" y="90" font-size="11" fill="#ff9e64">◈ Claude Sonnet 4.6</text>
  </g>

  <!-- ═════════════════════════════════════════════════════════════════ -->
  <!-- STATE 3: Over Limit (101% context, 85% rate limit) -->
  <!-- ═════════════════════════════════════════════════════════════════ -->
  <g id="state3" transform="translate(0, 280)">
    <text x="20" y="35" font-size="13" font-weight="bold" fill="#a9b1d6">Over Limit (Critical)</text>
    <text x="20" y="53" font-size="10" fill="#565f89">(101% context, 85% rate limit)</text>

    <!-- Terminal box -->
    <rect x="20" y="65" width="1160" height="60" fill="#1a1b26" stroke="#3b4261" stroke-width="1" rx="4"/>

    <!-- Statusline - when over limit, context bar is hidden -->
    <text x="30" y="90" font-size="11" fill="#7ba3ff">~/p/claude-code-statusline</text>

    <!-- Token count only (over limit) -->
    <text x="280" y="90" font-size="11" fill="#7aa2f7">⬡ 202.5k</text>

    <!-- Rate limit (85% = CRIT) -->
    <text x="387" y="90" font-size="11" fill="#565f89">󰔟</text>
    <text x="405" y="90" font-size="11" fill="#f7768e">━━━━━━╌ 85%</text>

    <!-- Model -->
    <text x="521" y="90" font-size="11" fill="#ff9e64">◈ Claude Sonnet 4.6</text>
  </g>

  <!-- Legend -->
  <text x="20" y="410" font-size="9" fill="#565f89">Dark mode • Tokyo Night • Bash 3.2+ • Zero dependencies • Runs on every Claude Code turn</text>
</svg>