<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
      text { font-family: "SF Mono", "Fira Code", "Courier New", monospace; }
    </style>
  </defs>

  <!-- Dark background (Tokyo Night) -->
  <rect width="100%" height="100%" fill="#16161e"/>

  <!-- ═════════════════════════════════════════════════════════════════ -->
  <!-- STATE 1: Normal Usage (65% context, 45% rate limit) -->
  <!-- ═════════════════════════════════════════════════════════════════ -->
  <g id="state1">
    <text x="20" y="35" font-size="13" font-weight="bold" fill="#a9b1d6">Normal Usage</text>
    <text x="20" y="53" font-size="10" fill="#565f89">(65% context window, 45% rate limit)</text>

    <!-- Terminal box -->
    <rect x="20" y="65" width="1160" height="70" fill="#1a1b26" stroke="#3b4261" stroke-width="1" rx="4"/>

    <!-- Prompt -->
    <text x="30" y="85" font-size="12" fill="#7aa2f7">claude 1:claude*</text>

    <!-- Statusline - Directory -->
    <text x="30" y="108" font-size="11" fill="#7ba3ff">~/p/claude-code-statusline</text>

    <!-- Separator -->
    <text x="234" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- Git branch -->
    <text x="244" y="108" font-size="11" fill="#c8b3ff">🔱 main</text>

    <!-- Separator -->
    <text x="309" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- Context bar (65% = WARN color) -->
    <text x="319" y="108" font-size="11" fill="#565f89">📊</text>
    <text x="333" y="108" font-size="11" fill="#ffcc88">━━━╌╌╌ 65%</text>

    <!-- Token count -->
    <text x="408" y="108" font-size="11" fill="#7aa2f7">⬡ 65.0k</text>

    <!-- Separator -->
    <text x="479" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- 5h rate limit (45% = OK color) -->
    <text x="489" y="108" font-size="11" fill="#565f89">📈</text>
    <text x="503" y="108" font-size="11" fill="#89dd94">━━━━╌╌╌ 45%</text>

    <!-- Reset timer -->
    <text x="600" y="108" font-size="11" fill="#565f89">↺</text>
    <text x="614" y="108" font-size="11" fill="#7dcfff">5h24m</text>

    <!-- Separator -->
    <text x="678" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- Model -->
    <text x="688" y="108" font-size="11" fill="#ff9e64">🧠 Claude Sonnet 4.6</text>
  </g>

  <!-- ═════════════════════════════════════════════════════════════════ -->
  <!-- STATE 2: High Usage (80% context, 60% rate limit) -->
  <!-- ═════════════════════════════════════════════════════════════════ -->
  <g id="state2" transform="translate(0, 170)">
    <text x="20" y="35" font-size="13" font-weight="bold" fill="#a9b1d6">High Usage (Warning)</text>
    <text x="20" y="53" font-size="10" fill="#565f89">(80% context window, 60% rate limit)</text>

    <!-- Terminal box -->
    <rect x="20" y="65" width="1160" height="70" fill="#1a1b26" stroke="#3b4261" stroke-width="1" rx="4"/>

    <!-- Prompt -->
    <text x="30" y="85" font-size="12" fill="#7aa2f7">claude 1:claude*</text>

    <!-- Statusline - Directory -->
    <text x="30" y="108" font-size="11" fill="#7ba3ff">~/p/claude-code-statusline</text>

    <!-- Separator -->
    <text x="234" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- Git branch -->
    <text x="244" y="108" font-size="11" fill="#c8b3ff">🔱 main</text>

    <!-- Separator -->
    <text x="309" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- Context bar (80% = WARN color, darker) -->
    <text x="319" y="108" font-size="11" fill="#565f89">📊</text>
    <text x="333" y="108" font-size="11" fill="#ffaa44">━━━━╌╌ 80%</text>

    <!-- Token count -->
    <text x="408" y="108" font-size="11" fill="#7aa2f7">⬡ 80.0k</text>

    <!-- Separator -->
    <text x="479" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- 5h rate limit (60% = WARN color) -->
    <text x="489" y="108" font-size="11" fill="#565f89">📈</text>
    <text x="503" y="108" font-size="11" fill="#ffcc88">━━━━━╌ 60%</text>

    <!-- Reset timer -->
    <text x="600" y="108" font-size="11" fill="#565f89">↺</text>
    <text x="614" y="108" font-size="11" fill="#7dcfff">5h19m</text>

    <!-- Separator -->
    <text x="678" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- Model -->
    <text x="688" y="108" font-size="11" fill="#ff9e64">🧠 Claude Sonnet 4.6</text>
  </g>

  <!-- ═════════════════════════════════════════════════════════════════ -->
  <!-- STATE 3: Over Limit (101% context, 85% rate limit) -->
  <!-- ═════════════════════════════════════════════════════════════════ -->
  <g id="state3" transform="translate(0, 340)">
    <text x="20" y="35" font-size="13" font-weight="bold" fill="#a9b1d6">Over Limit (Critical)</text>
    <text x="20" y="53" font-size="10" fill="#565f89">(101% context window, 85% rate limit)</text>

    <!-- Terminal box -->
    <rect x="20" y="65" width="1160" height="70" fill="#1a1b26" stroke="#3b4261" stroke-width="1" rx="4"/>

    <!-- Prompt -->
    <text x="30" y="85" font-size="12" fill="#7aa2f7">claude 1:claude*</text>

    <!-- Statusline - Directory -->
    <text x="30" y="108" font-size="11" fill="#7ba3ff">~/p/claude-code-statusline</text>

    <!-- Separator -->
    <text x="234" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- Git branch -->
    <text x="244" y="108" font-size="11" fill="#c8b3ff">🔱 main</text>

    <!-- Separator -->
    <text x="309" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- Token count (when over limit, context bar is hidden) -->
    <text x="319" y="108" font-size="11" fill="#7aa2f7">⬡ 101.0k</text>

    <!-- Separator -->
    <text x="408" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- 5h rate limit (85% = CRIT color) -->
    <text x="418" y="108" font-size="11" fill="#565f89">📈</text>
    <text x="432" y="108" font-size="11" fill="#f7768e">━━━━━━╌ 85%</text>

    <!-- Reset timer -->
    <text x="529" y="108" font-size="11" fill="#565f89">↺</text>
    <text x="543" y="108" font-size="11" fill="#7dcfff">5h08m</text>

    <!-- Separator -->
    <text x="607" y="108" font-size="11" fill="#3b4261">◄</text>

    <!-- Model -->
    <text x="617" y="108" font-size="11" fill="#ff9e64">🧠 Claude Sonnet 4.6</text>
  </g>

  <!-- Legend -->
  <text x="20" y="470" font-size="9" fill="#565f89">Dark mode (Tokyo Night) • Bash 3.2+ • Zero dependencies • Runs on every Claude Code turn</text>
</svg>