    <text x="20" y="321" font-family="'SF Mono','Menlo','JetBrains Mono','Courier New',monospace" font-size="13"><tspan fill="#c0caf5">All 14 tests pass. Set </tspan><tspan fill="#e0af68">JWT_SECRET</tspan><tspan fill="#c0caf5"> env var before deploying.</tspan></text>
