    <text x="20" y="174" font-family="'SF Mono','Menlo','JetBrains Mono','Courier New',monospace" font-size="13"><tspan fill="#c0caf5">Replacing DB-backed session validation with stateless JWT verification.</tspan></text>
    <text x="20" y="195" font-family="'SF Mono','Menlo','JetBrains Mono','Courier New',monospace" font-size="13"><tspan fill="#c0caf5">DB lookup is kept only for token revocation checks.</tspan></text>
