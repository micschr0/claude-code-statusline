    <text x="20" y="69" font-family="'SF Mono','Menlo','JetBrains Mono','Courier New',monospace" font-size="13"><tspan fill="#bb9af7">❯ </tspan><tspan fill="#565f89"># refactor auth middleware to use JWT validation</tspan></text>
